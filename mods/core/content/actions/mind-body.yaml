# Mind & Body activities (README §4.5.1). Player-initiated, repeatable each year.

- id: act.gym
  label: 'Go to the gym'
  category: mind-body
  conditions: [{ stat: age, op: '>=', value: 12 }]
  cost: { money: 50 }
  perYearLimit: 3
  outcomes:
    - weight: 80
      effects: [{ stat: health, op: '+', value: 6 }, { stat: looks, op: '+', value: 2 }]
      resultText: 'A solid workout. You feel stronger.'
    - weight: 20
      effects: [{ stat: health, op: '-', value: 3 }]
      resultText: 'You pulled a muscle.'

- id: act.library
  label: 'Study at the library'
  category: mind-body
  conditions: [{ stat: age, op: '>=', value: 6 }]
  perYearLimit: 3
  outcomes:
    - weight: 100
      effects: [{ stat: smarts, op: '+', value: 5 }, { stat: happiness, op: '-', value: 1 }]
      resultText: 'You hit the books and got a little smarter.'

- id: act.meditate
  label: 'Meditate'
  category: mind-body
  conditions: [{ stat: age, op: '>=', value: 10 }]
  perYearLimit: 2
  outcomes:
    - weight: 100
      effects: [{ stat: happiness, op: '+', value: 5 }, { stat: health, op: '+', value: 1 }]
      resultText: 'You found a moment of calm.'

- id: act.doctor
  label: 'See a doctor'
  category: mind-body
  conditions: [{ stat: age, op: '>=', value: 1 }]
  cost: { money: 200 }
  perYearLimit: 1
  outcomes:
    - weight: 100
      effects: [{ stat: health, op: '+', value: 12 }]
      resultText: 'A checkup and some care. Your health improved.'
