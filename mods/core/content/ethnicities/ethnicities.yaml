# Ethnicities with gendered name pools (goal items 4, 7). Pools are small,
# representative samples — a real mod can expand them. `neutral` names are used
# for nonbinary characters.
ethnicities:
  - id: eth.white
    label: 'White'
    weight: 5
    names:
      male: [James, William, Henry, Jack, Thomas, George]
      female: [Emily, Charlotte, Grace, Olivia, Sophie, Alice]
      neutral: [Alex, Charlie, Sam, Jordan]
      surnames: [Smith, Johnson, Walker, Clarke, Taylor, Brooks]

